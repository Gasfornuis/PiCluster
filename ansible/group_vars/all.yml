# ansible/group_vars/all.yml
 
#Nodes
master_ip: "192.168.1.101"

workers:
  - name: pi-worker1
    ip: "192.168.1.102"
  - name: pi-worker2
    ip: "192.168.1.103"
 
#SSH
ansible_user: pi
ansible_password: "{{ vault_ansible_password }}"
ansible_ssh_common_args: '-o StrictHostKeyChecking=no'
 
#k3s
k3s_version: "v1.29.3+k3s1"
k3s_token: "{{ vault_k3s_token }}"
