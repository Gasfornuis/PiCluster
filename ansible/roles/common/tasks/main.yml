# ansible/roles/common/tasks/main.yml

- name: Update apt cache
  apt:
    update_cache: yes
    cache_valid_time: 3600

- name: Install required packages
  apt:
    name:
      - curl
      - apt-transport-https
      - ca-certificates
    state: present

- name: Enable cgroups for k3s (required on Raspberry Pi)
  lineinfile:
    path: /boot/cmdline.txt
    backrefs: yes
    regexp: '^(.*?)(\s?cgroup_enable=memory)?(\s?cgroup_memory=1)?$'
    line: '\1 cgroup_enable=cpuset cgroup_enable=memory cgroup_memory=1'
  notify: Reboot node

- name: Set hostname dynamically from inventory
  hostname:
    name: "{{ inventory_hostname }}"
