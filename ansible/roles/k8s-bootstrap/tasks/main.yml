# ansible/roles/k8s-bootstrap/tasks/main.yml

- name: Wait for k3s API to be ready
  wait_for:
    port: 6443
    host: "{{ master_ip }}"
    timeout: 120

- name: Set KUBECONFIG
  set_fact:
    kubeconfig_path: /etc/rancher/k3s/k3s.yaml

# --- Namespaces ---
- name: Create namespaces
  command: kubectl apply -f -
  args:
    stdin: "{{ lookup('file', playbook_dir + '/../kubernetes/namespaces/namespaces.yml') }}"
  environment:
    KUBECONFIG: "{{ kubeconfig_path }}"

