# --- Monitoring via Helm ---
- name: Install Helm
  shell: curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
  args:
    creates: /usr/local/bin/helm

- name: Add Prometheus Helm repo
  command: helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
  environment:
    KUBECONFIG: "{{ kubeconfig_path }}"
  changed_when: false

- name: Update Helm repos
  command: helm repo update
  environment:
    KUBECONFIG: "{{ kubeconfig_path }}"
  changed_when: false

- name: Copy Helm values to master
  copy:
    src: "{{ playbook_dir }}/../kubernetes/monitoring/helm-values.yml"
    dest: /tmp/helm-values.yml

- name: Deploy Prometheus + Grafana stack
  command: >
    helm upgrade --install monitoring
    prometheus-community/kube-prometheus-stack
    --namespace monitoring
    --values /tmp/helm-values.yml
    --wait --timeout 5m
  environment:
    KUBECONFIG: "{{ kubeconfig_path }}"

- name: Apply monitoring ingress
  command: kubectl apply -f -
  args:
    stdin: "{{ lookup('file', playbook_dir + '/../kubernetes/monitoring/ingress.yml') }}"
  environment:
    KUBECONFIG: "{{ kubeconfig_path }}"
