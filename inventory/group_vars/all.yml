# inventory/group_vars/all.yml

# Nodes
master_ip: "192.168.1.10"

workers:
  - name: pi-worker1
    ip: "192.168.1.20"
  - name: pi-worker2
    ip: "192.168.1.30"

# SSH
ansible_user: piuser
ansible_ssh_private_key_file: "~/.ssh/pi"
ansible_ssh_common_args: '-o StrictHostKeyChecking=no'

# k3s
k3s_version: "v1.29.3+k3s1"
k3s_token: "{{ vault_k3s_token }}"
