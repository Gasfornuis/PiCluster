# Test environment - Multipass VMs on macOS

# Nodes (update IPs after running multipass list)
master_ip: "MASTER_IP"

workers:
  - name: pi-worker1
    ip: "WORKER1_IP"
  - name: pi-worker2
    ip: "WORKER2_IP"

# SSH - Multipass uses ubuntu user with key auth
ansible_user: ubuntu
ansible_ssh_private_key_file: "~/.ssh/multipass_key"
ansible_ssh_common_args: '-o StrictHostKeyChecking=no'

# k3s
k3s_version: "v1.29.3+k3s1"
k3s_token: "test-token-12345"
